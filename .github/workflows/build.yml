name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK, NDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          ndk-version: 34.0.0
          # Install CMake separately as 3.22.1 may not be available via SDK
      - name: Install CMake 3.22.1
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.22.1/cmake-3.22.1-linux-x86_64.tar.gz
          tar -xzf cmake-3.22.1-linux-x86_64.tar.gz
          sudo mv cmake-3.22.1-linux-x86_64 /opt/cmake-3.22.1
          echo "/opt/cmake-3.22.1/bin" >> $GITHUB_PATH
          # Verify version
          cmake --version

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease